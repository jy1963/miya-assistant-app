name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Build Release APK
        run: ./gradlew assembleRelease
        continue-on-error: true

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: miya-assistant-debug
          path: app/build/outputs/apk/debug/*.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: miya-assistant-release
          path: app/build/outputs/apk/release/*.apk
        continue-on-error: true

      - name: Create Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Miya Assistant v1.0.${{ github.run_number }}
          body: |
            ## Miya Assistant Android App

            📱 **Miya Assistant** 的 Android 安装包

            ### 安装方法
            1. 下载 `app-debug.apk`
            2. 在 Android 手机上打开，允许"安装未知来源应用"
            3. 安装完成后打开即可使用

            ### 更新日志
            - 基于 WebView 的原生 Android 应用
            - 全屏沉浸式体验
            - 支持 IndexedDB 无限存储
            - 支持 JSON 导出/导入
          files: |
            app/build/outputs/apk/debug/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
